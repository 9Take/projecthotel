<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Lobby System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; display: inline-block; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hotel Lobby Dashboard</h1>
        
        <h2>Door Status: <span id="door_status" style="color: blue;">Unknown</span></h2>
        <h2>Current (A): <span id="current_val">0.00</span></h2>
        <h2>Last RFID: <span id="rfid_val">None</span></h2>

        <hr>
        <button onclick="controlDoor('OPEN')" style="background-color: lightgreen;">OPEN DOOR</button>
        <button onclick="controlDoor('CLOSE')" style="background-color: lightcoral;">CLOSE DOOR</button>
    </div>

    <script>
        const socket = io(); // เชื่อมต่อ WebSockets กับ Backend

        // 1. รอรับข้อมูลที่ Backend (server.js) โยนมาให้
        socket.on('sensor_data', (data) => {
            // เช็คว่า Topic คืออะไร แล้วเอาค่าไปแปะให้ถูกที่
            if (data.topic === 'room/door_status') {
                document.getElementById('door_status').innerText = data.value;
            } else if (data.topic === 'room/current') {
                document.getElementById('current_val').innerText = data.value;
            } else if (data.topic === 'room/rfid') {
                document.getElementById('rfid_val').innerText = data.value;
            }
        });

        // 2. ฟังก์ชันตอนกดปุ่ม ให้ส่งคำสั่งไป Backend
        function controlDoor(command) {
            socket.emit('send_control', command);
        }
    </script>

</body>
</html>
