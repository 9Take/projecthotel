version: '3.8'

services:
  # 1. MQTT Broker
  mqtt:
    image: eclipse-mosquitto:latest
    container_name: hotel_mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # 2. Custom Dashboard (Node.js)
  hotel_dashboard:
    build: ./hotel-dashboard
    container_name: hotel_dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./hotel-dashboard:/usr/src/app
      - /usr/src/app/node_modules
    env_file:          # 🌟 เพิ่มบรรทัดนี้
      - .env           # 🌟 เพิ่มบรรทัดนี้
    depends_on:
      - mysql
      - mqtt
    restart: unless-stopped

  # 3. MySQL Database
  mysql:
    image: mysql:latest
    container_name: hotel_database
    environment:
      # แก้ชื่อตัวแปรตรงนี้ให้ตรงกับใน .env
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - TZ=Asia/Bangkok


